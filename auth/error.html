<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Print Ready — Error</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #1a1a1a;
      color: #fff;
    }
    .card {
      text-align: center;
      max-width: 360px;
      padding: 40px;
    }
    .icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 20px;
      background: #ff4646;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .icon svg {
      width: 24px;
      height: 24px;
    }
    .title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 12px;
      color: #ff4646;
    }
    .message {
      color: #ccc;
      font-size: 14px;
      margin-bottom: 8px;
    }
    .subtitle {
      color: #999;
      font-size: 14px;
      line-height: 1.6;
    }
  </style>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var params = new URLSearchParams(window.location.search);
      var msg = params.get('msg') || 'An unknown error occurred.';
      document.getElementById('error-msg').textContent = msg;
    });
  </script>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </div>
    <div class="title">Authentication failed</div>
    <div class="message" id="error-msg"></div>
    <div class="subtitle">Please try again from the plugin.</div>
  </div>
</body>
</html>
